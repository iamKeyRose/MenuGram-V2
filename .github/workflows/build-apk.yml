name: Build Android APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Configure Project Identity
        run: |
          # 1. Initialize Git at the Root (EAS requirement)
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git init
          
          # 2. Force-create the 'app.json' in the mobile folder
          cat <<EOF > apps/mobile-expo/app.json
          {
            "expo": {
              "name": "MenuGram",
              "slug": "menugram",
              "version": "1.0.0",
              "owner": "mytsoul",
              "android": { "package": "com.menugram.app" },
              "extra": { 
                "eas": { "projectId": "11b790d5-66b3-407d-b7ac-aa03ac13a6b6" } 
              }
            }
          }
          EOF

          # 3. Force-create 'eas.json' in the mobile folder
          cat <<EOF > apps/mobile-expo/eas.json
          {
            "build": {
              "preview": {
                "android": { "buildType": "apk" }
              }
            }
          }
          EOF

          # 4. Create hidden linking files in both Root and App folder
          mkdir -p .expo
          echo '{"projectId": "11b790d5-66b3-407d-b7ac-aa03ac13a6b6"}' > .expo/settings.json
          mkdir -p apps/mobile-expo/.expo
          echo '{"projectId": "11b790d5-66b3-407d-b7ac-aa03ac13a6b6"}' > apps/mobile-expo/.expo/settings.json
          
          # 5. Commit these locally to satisfy the CLI
          git add .
          git commit -m "chore: link expo project"

      - name: Install Dependencies
        run: |
          cd apps/mobile-expo
          npm install --legacy-peer-deps

      - name: Build APK (Cloud Build)
        run: |
          cd apps/mobile-expo
          # Setting these variables directly in the command line bypasses the 'eas init' check
          EAS_PROJECT_ID="11b790d5-66b3-407d-b7ac-aa03ac13a6b6" \
          EAS_NO_VCS=1 \
          npx eas-cli build --platform android --profile preview --non-interactive
