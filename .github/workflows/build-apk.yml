name: Build Android APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Initialize Enterprise Project
        run: |
          # 1. Start fresh
          rm -rf *

          # 2. Create the Package.json FIRST (pinned to SDK 51)
          cat <<EOF > package.json
          {
            "name": "menugram",
            "version": "1.0.0",
            "main": "index.js",
            "dependencies": {
              "expo": "~51.0.8",
              "expo-status-bar": "~1.12.1",
              "react": "18.2.0",
              "react-native": "0.74.1",
              "react-native-safe-area-context": "4.10.1",
              "react-native-screens": "3.31.1",
              "lucide-react-native": "0.378.0",
              "react-native-svg": "15.3.0"
            },
            "devDependencies": {
              "@babel/core": "^7.24.0",
              "babel-preset-expo": "~11.0.11"
            },
            "private": true
          }
          EOF

      - name: Install Dependencies
        run: |
          # This puts the 'expo' module in place so the next steps don't fail
          npm install --legacy-peer-deps

      - name: Generate App Logic & Identity
        run: |
          # 3. Create babel.config.js
          cat <<EOF > babel.config.js
          module.exports = function(api) {
            api.cache(true);
            return {
              presets: ['babel-preset-expo'],
            };
          };
          EOF

          # 4. Create index.js (SDK 51 Entry Point)
          cat <<EOF > index.js
          import { registerRootComponent } from 'expo';
          import React from 'react';
          import { View, Text, StyleSheet } from 'react-native';
          import { Wallet } from 'lucide-react-native';

          function App() {
            return (
              <View style={styles.c}>
                <Wallet color="#fff" size={80} />
                <Text style={styles.b}>450.00 MGRAM</Text>
                <Text style={styles.t}>MenuGram Enterprise Wallet</Text>
              </View>
            );
          }

          const styles = StyleSheet.create({
            c: { flex: 1, backgroundColor: '#6366f1', alignItems: 'center', justifyContent: 'center' },
            b: { color: '#fff', fontSize: 42, fontWeight: 'bold', marginTop: 20 },
            t: { color: '#fff', fontSize: 16, opacity: 0.8 }
          });

          registerRootComponent(App);
          EOF

          # 5. Create app.json with your specific Project ID
          cat <<EOF > app.json
          {
            "expo": {
              "name": "MenuGram",
              "slug": "menugram",
              "version": "1.0.0",
              "owner": "mytsoul",
              "orientation": "portrait",
              "android": {
                "package": "com.mytsoul.menugram"
              },
              "extra": {
                "eas": {
                  "projectId": "11b790d5-66b3-407d-b7ac-aa03ac13a6b6"
                }
              }
            }
          }
          EOF

          # 6. Create hidden identity file to bypass 'eas init'
          mkdir -p .expo
          echo '{"projectId": "11b790d5-66b3-407d-b7ac-aa03ac13a6b6"}' > .expo/settings.json

          # 7. Create eas.json for APK build
          cat <<EOF > eas.json
          {
            "build": {
              "preview": {
                "android": { "buildType": "apk" }
              }
            }
          }
          EOF

      - name: Build APK (Cloud Build)
        run: |
          # Use EAS_NO_VCS to bypass Git requirements on the runner
          export EAS_NO_VCS=1
          npx eas-cli build --platform android --profile preview --non-interactive
