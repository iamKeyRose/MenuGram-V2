name: Build Android APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Generate and Flatten Official Project
        run: |
          # 1. Generate the app in a temporary folder to avoid the 'not empty' error
          npx create-expo-app@latest tmp_app --template blank --no-install
          
          # 2. Move everything to the root
          cp -rn tmp_app/* .
          rm -rf tmp_app

          # 3. Use 'expo install' to pin the exact compatible versions for SDK 51
          npx expo install lucide-react-native react-native-svg react-native-safe-area-context react-native-screens

          # 4. Overwrite App.js with the Wallet UI
          cat <<EOF > App.js
          import React from 'react';
          import { StyleSheet, Text, View, SafeAreaView } from 'react-native';
          import { Wallet } from 'lucide-react-native';

          export default function App() {
            return (
              <SafeAreaView style={{flex: 1, backgroundColor: '#6366f1', justifyContent: 'center', alignItems: 'center'}}>
                <Wallet color="#fff" size={64} />
                <Text style={{color: '#fff', fontSize: 42, fontWeight: 'bold', marginTop: 20}}>450.00</Text>
                <Text style={{color: '#fff', fontSize: 18, opacity: 0.8}}>MGRAM Social Credits</Text>
                <View style={{marginTop: 40, backgroundColor: '#fff', padding: 20, borderRadius: 20}}>
                   <Text style={{color: '#6366f1', fontWeight: 'bold'}}>MenuGram V2 Dashboard</Text>
                </View>
              </SafeAreaView>
            );
          }
          EOF

          # 5. Create a perfect app.json
          cat <<EOF > app.json
          {
            "expo": {
              "name": "MenuGram",
              "slug": "menugram",
              "version": "1.0.0",
              "owner": "mytsoul",
              "orientation": "portrait",
              "icon": "./assets/icon.png",
              "userInterfaceStyle": "light",
              "android": {
                "package": "com.mytsoul.menugram",
                "adaptiveIcon": { "backgroundColor": "#ffffff" }
              },
              "extra": {
                "eas": { "projectId": "11b790d5-66b3-407d-b7ac-aa03ac13a6b6" }
              }
            }
          }
          EOF

          # 6. Create the eas.json
          cat <<EOF > eas.json
          {
            "build": {
              "preview": {
                "android": { "buildType": "apk" }
              }
            }
          }
          EOF

          # 7. Create the identity link
          mkdir -p .expo
          echo '{"projectId": "11b790d5-66b3-407d-b7ac-aa03ac13a6b6"}' > .expo/settings.json

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build APK (Cloud Build)
        run: |
          export EAS_NO_VCS=1
          npx eas-cli build --platform android --profile preview --non-interactive
