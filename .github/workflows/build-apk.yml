name: Build Android APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Flatten & Deep Configuration
        run: |
          # 1. Move skeleton to root
          cp -r apps/mobile-expo/* . || true
          
          # 2. Create a VALID Production Package.json (SDK 51)
          cat <<EOF > package.json
          {
            "name": "menugram",
            "version": "1.0.0",
            "main": "node_modules/expo/AppEntry.js",
            "scripts": {
              "start": "expo start",
              "android": "expo run:android"
            },
            "dependencies": {
              "expo": "~51.0.0",
              "expo-status-bar": "~1.12.1",
              "react": "18.2.0",
              "react-native": "0.74.1"
            },
            "devDependencies": {
              "@babel/core": "^7.20.0"
            },
            "private": true
          }
          EOF

          # 3. Create a Valid app.json
          cat <<EOF > app.json
          {
            "expo": {
              "name": "MenuGram",
              "slug": "menugram",
              "version": "1.0.0",
              "orientation": "portrait",
              "icon": "./assets/icon.png",
              "userInterfaceStyle": "light",
              "splash": { "backgroundColor": "#ffffff" },
              "owner": "mytsoul",
              "android": { 
                "package": "com.menugram.app",
                "adaptiveIcon": { "backgroundColor": "#ffffff" }
              },
              "extra": { "eas": { "projectId": "11b790d5-66b3-407d-b7ac-aa03ac13a6b6" } }
            }
          }
          EOF

          # 4. Create a basic App entry point so the build isn't empty
          cat <<EOF > App.js
          import React from 'react';
          import { StyleSheet, Text, View } from 'react-native';
          export default function App() {
            return (
              <View style={styles.container}>
                <Text style={{fontSize: 24, fontWeight: 'bold'}}>MenuGram V2</Text>
                <Text>Social Currency Marketplace</Text>
              </View>
            );
          }
          const styles = StyleSheet.create({
            container: { flex: 1, backgroundColor: '#fff', alignItems: 'center', justifyContent: 'center' },
          });
          EOF

          # 5. Fix the hidden identity file
          mkdir -p .expo
          echo '{"projectId": "11b790d5-66b3-407d-b7ac-aa03ac13a6b6"}' > .expo/settings.json

      - name: Install Libraries
        run: |
          npm install --legacy-peer-deps

      - name: Build APK (Cloud Build)
        run: |
          export EAS_NO_VCS=1
          npx eas-cli build --platform android --profile preview --non-interactive
  
