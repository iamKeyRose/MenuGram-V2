name: Build Android APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install Dependencies
        run: |
          cd apps/mobile-expo
          # Ensure necessary build modules are present
          npm install --save-dev expo-modules-autolinking
          # Install with legacy-peer-deps to ignore version conflicts on mobile
          npm install --legacy-peer-deps

      - name: Build APK
        run: |
          cd apps/mobile-expo
          # 1. Force the Project ID into the environment
          export EAS_PROJECT_ID="11b790d5-66b3-407d-b7ac-aa03ac13a6b6"
          
          # 2. Run the build in non-interactive mode
          # --profile preview: Uses the APK settings from eas.json
          # --platform android: Targets Android
          # --non-interactive: Prevents the build from pausing to ask questions
          npx eas-cli build --platform android --profile preview --non-interactive
