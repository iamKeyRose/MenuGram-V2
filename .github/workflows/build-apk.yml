name: Build Android APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Clean Room Project Creation
        run: |
          # 1. Start with a fresh directory
          rm -rf * 
          
          # 2. Create the standard Package.json (Added babel-preset-expo)
          cat <<EOF > package.json
          {
            "name": "menugram",
            "version": "1.0.0",
            "main": "node_modules/expo/AppEntry.js",
            "dependencies": {
              "expo": "~51.0.0",
              "expo-status-bar": "~1.12.1",
              "react": "18.2.0",
              "react-native": "0.74.1",
              "react-native-safe-area-context": "4.10.1",
              "react-native-screens": "3.31.1",
              "@react-navigation/native": "^6.1.17",
              "@react-navigation/bottom-tabs": "^6.5.20"
            },
            "devDependencies": {
              "@babel/core": "^7.20.0",
              "babel-preset-expo": "~11.0.0"
            },
            "private": true
          }
          EOF

          # 3. Create babel.config.js (THIS FIXES THE GRADLE ERROR)
          cat <<EOF > babel.config.js
          module.exports = function(api) {
            api.cache(true);
            return {
              presets: ['babel-preset-expo'],
            };
          };
          EOF

          # 4. Create a Robust App.js (Using Emoji instead of icons to prevent crashes)
          cat <<EOF > App.js
          import React from 'react';
          import { View, Text } from 'react-native';
          import { NavigationContainer } from '@react-navigation/native';
          import { createBottomTabNavigator } from '@react-navigation/bottom-tabs';

          const Tab = createBottomTabNavigator();

          function Wallet() {
            return (
              <View style={{flex:1, justifyContent:'center', alignItems:'center', backgroundColor:'#6366f1'}}>
                <Text style={{color:'#fff', fontSize:40, fontWeight:'bold'}}>450.00 MGRAM</Text>
                <Text style={{color:'#fff'}}>Social Wallet Active</Text>
              </View>
            );
          }

          function Market() {
            return (
              <View style={{flex:1, justifyContent:'center', alignItems:'center'}}>
                <Text style={{fontSize:24}}>🏪 MenuGram Marketplace</Text>
              </View>
            );
          }

          export default function App() {
            return (
              <NavigationContainer>
                <Tab.Navigator>
                  <Tab.Screen name="Market" component={Market} options={{ tabBarLabel: '🏪 Store' }} />
                  <Tab.Screen name="Wallet" component={Wallet} options={{ tabBarLabel: '💰 Wallet' }} />
                </Tab.Navigator>
              </NavigationContainer>
            );
          }
          EOF

          # 5. Create app.json (Updated package name for mytsoul)
          cat <<EOF > app.json
          {
            "expo": {
              "name": "MenuGram",
              "slug": "menugram",
              "version": "1.0.0",
              "owner": "mytsoul",
              "android": {
                "package": "com.mytsoul.menugram"
              },
              "extra": {
                "eas": { "projectId": "11b790d5-66b3-407d-b7ac-aa03ac13a6b6" }
              }
            }
          }
          EOF

          # 6. Final Identity Link
          mkdir -p .expo
          echo '{"projectId": "11b790d5-66b3-407d-b7ac-aa03ac13a6b6"}' > .expo/settings.json

      - name: Install Dependencies
        run: npm install

      - name: Build APK (Cloud Build)
        run: |
          export EAS_NO_VCS=1
          npx eas-cli build --platform android --profile preview --non-interactive
