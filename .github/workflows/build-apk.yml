name: Build Android APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Generate Official Expo Project
        run: |
          # 1. Wipe everything
          rm -rf *

          # 2. Use the OFFICIAL Expo generator (No manual package.json)
          # This ensures the Gradle files are 100% correct
          npx create-expo-app@latest . --template blank --no-install

          # 3. Use 'expo install' to add libraries (This pins the exact correct versions)
          npx expo install lucide-react-native react-native-svg

          # 4. Overwrite the App.js with our Wallet Logic
          cat <<EOF > App.js
          import React from 'react';
          import { StyleSheet, Text, View, SafeAreaView } from 'react-native';
          import { Wallet } from 'lucide-react-native';

          export default function App() {
            return (
              <SafeAreaView style={{flex: 1, backgroundColor: '#6366f1', justifyContent: 'center', alignItems: 'center'}}>
                <Wallet color="#fff" size={64} />
                <Text style={{color: '#fff', fontSize: 42, fontWeight: 'bold', marginTop: 20}}>450.00</Text>
                <Text style={{color: '#fff', fontSize: 18, opacity: 0.8}}>MGRAM Social Credits</Text>
                <View style={{marginTop: 40, backgroundColor: '#fff', padding: 20, borderRadius: 20}}>
                   <Text style={{color: '#6366f1', fontWeight: 'bold'}}>MenuGram V2 Dashboard</Text>
                </View>
              </SafeAreaView>
            );
          }
          EOF

          # 5. Inject your ID and Username into the generated app.json
          # We use 'jq' to edit the JSON safely
          jq '.expo.owner = "mytsoul" | .expo.android.package = "com.mytsoul.menugram" | .expo.extra.eas.projectId = "11b790d5-66b3-407d-b7ac-aa03ac13a6b6"' app.json > temp.json && mv temp.json app.json

          # 6. Create the identity link
          mkdir -p .expo
          echo '{"projectId": "11b790d5-66b3-407d-b7ac-aa03ac13a6b6"}' > .expo/settings.json

      - name: Install Dependencies
        run: npm install

      - name: Build APK (Cloud Build)
        run: |
          export EAS_NO_VCS=1
          npx eas-cli build --platform android --profile preview --non-interactive
