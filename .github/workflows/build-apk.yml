name: Build Android APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Flatten Project & Configure
        run: |
          # 1. Move all mobile files to the ROOT so EAS can find them easily
          cp -r apps/mobile-expo/* .
          
          # 2. Force-create the identity file that fixes the error
          mkdir -p .expo
          echo '{"projectId": "11b790d5-66b3-407d-b7ac-aa03ac13a6b6"}' > .expo/settings.json
          
          # 3. Create the app.json at the root
          cat <<EOF > app.json
          {
            "expo": {
              "name": "MenuGram",
              "slug": "menugram",
              "version": "1.0.0",
              "owner": "mytsoul",
              "android": { "package": "com.menugram.app" },
              "extra": { "eas": { "projectId": "11b790d5-66b3-407d-b7ac-aa03ac13a6b6" } }
            }
          }
          EOF

          # 4. Create the eas.json at the root
          cat <<EOF > eas.json
          {
            "build": {
              "preview": {
                "android": { "buildType": "apk" }
              }
            }
          }
          EOF

      - name: Install Dependencies
        run: |
          # Install at root since we moved the files
          npm install --legacy-peer-deps

      - name: Build APK (Cloud Build)
        run: |
          # Force EAS to use the ID and skip version control checks
          export EAS_NO_VCS=1
          npx eas-cli build --platform android --profile preview --non-interactive
