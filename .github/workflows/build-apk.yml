name: Build Android APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install Dependencies
        run: |
          cd apps/mobile-expo
          npm install --legacy-peer-deps

      - name: Fake Project Init
        run: |
          cd apps/mobile-expo
          
          # 1. Initialize a temporary local Git (EAS loves Git)
          git init
          git config user.email "action@github.com"
          git config user.name "GitHub Action"

          # 2. Force-create a perfect app.json
          cat <<EOF > app.json
          {
            "expo": {
              "name": "MenuGram",
              "slug": "menugram",
              "version": "1.0.0",
              "owner": "mytsoul",
              "android": { "package": "com.menugram.app" },
              "extra": { "eas": { "projectId": "11b790d5-66b3-407d-b7ac-aa03ac13a6b6" } }
            }
          }
          EOF

          # 3. Force-create a perfect eas.json
          cat <<EOF > eas.json
          {
            "build": {
              "preview": {
                "android": { "buildType": "apk" }
              }
            }
          }
          EOF

          # 4. Create the hidden settings file
          mkdir -p .expo
          echo '{"projectId": "11b790d5-66b3-407d-b7ac-aa03ac13a6b6"}' > .expo/settings.json
          
          # 5. Commit these locally to satisfy the "configured" check
          git add .
          git commit -m "local config"

      - name: Build APK
        run: |
          cd apps/mobile-expo
          
          # EAS_NO_VCS=1 tells Expo to use our manual files instead of searching GitHub
          export EAS_NO_VCS=1
          export EAS_PROJECT_ID="11b790d5-66b3-407d-b7ac-aa03ac13a6b6"
          
          npx eas-cli build --platform android --profile preview --non-interactive
