name: Build Android APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install Dependencies
        run: |
          cd apps/mobile-expo
          npm install --legacy-peer-deps

      - name: Force Project Configuration
        run: |
          cd apps/mobile-expo
          
          # 1. Manually create the hidden Expo settings folder/file
          mkdir -p .expo
          echo '{"projectId": "11b790d5-66b3-407d-b7ac-aa03ac13a6b6"}' > .expo/settings.json
          
          # 2. Re-write the app.json to be 100% perfect for the build
          cat <<EOF > app.json
          {
            "expo": {
              "name": "MenuGram",
              "slug": "menugram",
              "version": "1.0.0",
              "owner": "mytsoul",
              "android": { "package": "com.menugram.app" },
              "extra": { "eas": { "projectId": "11b790d5-66b3-407d-b7ac-aa03ac13a6b6" } }
            }
          }
          EOF

          # 3. Re-write eas.json
          cat <<EOF > eas.json
          {
            "build": {
              "preview": {
                "android": { "buildType": "apk" }
              }
            }
          }
          EOF

      - name: Build APK (Bypass Link Check)
        run: |
          cd apps/mobile-expo
          # EAS_NO_VCS=1 tells the computer to ignore the project check and just build
          # EXPO_APPLE_ID and other vars are not needed for Android
          export EAS_PROJECT_ID="11b790d5-66b3-407d-b7ac-aa03ac13a6b6"
          EAS_NO_VCS=1 npx eas-cli build --platform android --profile preview --non-interactive
