name: Build Android APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Prepare Unified Project Root
        run: |
          # 1. Initialize Git at the VERY ROOT of the monorepo
          git init
          git config user.email "action@github.com"
          git config user.name "GitHub Action"

          # 2. Ensure app.json is perfect in the mobile folder
          cat <<EOF > apps/mobile-expo/app.json
          {
            "expo": {
              "name": "MenuGram",
              "slug": "menugram",
              "version": "1.0.0",
              "owner": "mytsoul",
              "android": { "package": "com.menugram.app" },
              "extra": { "eas": { "projectId": "11b790d5-66b3-407d-b7ac-aa03ac13a6b6" } }
            }
          }
          EOF

          # 3. Ensure eas.json is perfect in the mobile folder
          cat <<EOF > apps/mobile-expo/eas.json
          {
            "build": {
              "preview": {
                "android": { "buildType": "apk" }
              }
            }
          }
          EOF

          # 4. Create the hidden settings file inside the mobile folder
          mkdir -p apps/mobile-expo/.expo
          echo '{"projectId": "11b790d5-66b3-407d-b7ac-aa03ac13a6b6"}' > apps/mobile-expo/.expo/settings.json
          
          # 5. Commit everything from the ROOT so EAS sees a clean Git state
          git add .
          git commit -m "Fix: Unified Git Root for EAS"

      - name: Install Dependencies
        run: |
          cd apps/mobile-expo
          npm install --legacy-peer-deps

      - name: Build APK
        run: |
          cd apps/mobile-expo
          # Provide the ID directly to the CLI
          export EAS_PROJECT_ID="11b790d5-66b3-407d-b7ac-aa03ac13a6b6"
          
          # We run the build from the subfolder, but EAS now sees the Git root above it
          npx eas-cli build --platform android --profile preview --non-interactive
