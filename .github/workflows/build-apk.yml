name: Build Android APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Create Production Project
        run: |
          # 1. Clear everything
          rm -rf *

          # 2. Create a PERFECT Package.json (SDK 50 for stability)
          cat <<EOF > package.json
          {
            "name": "menugram",
            "version": "1.0.0",
            "main": "node_modules/expo/AppEntry.js",
            "dependencies": {
              "expo": "~50.0.14",
              "expo-status-bar": "~1.11.1",
              "react": "18.2.0",
              "react-native": "0.73.6",
              "lucide-react-native": "0.363.0",
              "react-native-svg": "14.1.0"
            },
            "devDependencies": {
              "@babel/core": "^7.20.0",
              "babel-preset-expo": "~10.0.1"
            },
            "private": true
          }
          EOF

          # 3. Create babel.config.js
          cat <<EOF > babel.config.js
          module.exports = function(api) {
            api.cache(true);
            return {
              presets: ['babel-preset-expo'],
            };
          };
          EOF

          # 4. Create a High-Fidelity Single-Screen App.js
          cat <<EOF > App.js
          import React from 'react';
          import { StyleSheet, Text, View, TouchableOpacity, SafeAreaView } from 'react-native';
          import { Wallet, ArrowUpRight, ArrowDownLeft, History } from 'lucide-react-native';

          export default function App() {
            return (
              <SafeAreaView style={styles.container}>
                <View style={styles.header}>
                  <Text style={styles.title}>MenuGram V2</Text>
                  <Text style={styles.subtitle}>Social Currency Ledger</Text>
                </View>

                <View style={styles.card}>
                  <Text style={styles.cardLabel}>Current Balance</Text>
                  <Text style={styles.balance}>450.00 MGRAM</Text>
                  <Text style={styles.fiatEq}>≈ $45.00 USD</Text>
                </View>

                <View style={styles.actions}>
                  <TouchableOpacity style={styles.btn}>
                    <ArrowUpRight color="#6366f1" size={24} />
                    <Text style={styles.btnText}>Send</Text>
                  </TouchableOpacity>
                  <TouchableOpacity style={styles.btn}>
                    <ArrowDownLeft color="#6366f1" size={24} />
                    <Text style={styles.btnText}>Receive</Text>
                  </TouchableOpacity>
                  <TouchableOpacity style={styles.btn}>
                    <History color="#6366f1" size={24} />
                    <Text style={styles.btnText}>History</Text>
                  </TouchableOpacity>
                </View>

                <View style={styles.footer}>
                  <Text style={styles.footerText}>Enterprise Node: Active</Text>
                  <Text style={styles.footerText}>User: mytsoul</Text>
                </View>
              </SafeAreaView>
            );
          }

          const styles = StyleSheet.create({
            container: { flex: 1, backgroundColor: '#f8fafc', padding: 20 },
            header: { marginTop: 40, marginBottom: 30 },
            title: { fontSize: 28, fontWeight: '900', color: '#0f172a' },
            subtitle: { fontSize: 16, color: '#64748b' },
            card: { 
              backgroundColor: '#6366f1', 
              padding: 30, 
              borderRadius: 30, 
              shadowColor: '#6366f1',
              shadowOffset: { width: 0, height: 10 },
              shadowOpacity: 0.3,
              shadowRadius: 20,
              elevation: 10
            },
            cardLabel: { color: '#fff', opacity: 0.8, fontSize: 14, textTransform: 'uppercase' },
            balance: { color: '#fff', fontSize: 38, fontWeight: 'bold', marginTop: 10 },
            fiatEq: { color: '#fff', opacity: 0.7, marginTop: 5 },
            actions: { flexDirection: 'row', justifyContent: 'space-between', marginTop: 40 },
            btn: { backgroundColor: '#fff', padding: 20, borderRadius: 20, alignItems: 'center', width: '30%', borderWidth: 1, borderColor: '#e2e8f0' },
            btnText: { marginTop: 8, fontSize: 12, fontWeight: 'bold', color: '#1e293b' },
            footer: { marginTop: 'auto', marginBottom: 20, alignItems: 'center' },
            footerText: { color: '#94a3b8', fontSize: 12 }
          });
          EOF

          # 5. Perfect app.json (NO ASSETS)
          cat <<EOF > app.json
          {
            "expo": {
              "name": "MenuGram",
              "slug": "menugram",
              "version": "1.0.0",
              "owner": "mytsoul",
              "android": {
                "package": "com.mytsoul.menugram"
              },
              "extra": {
                "eas": { "projectId": "11b790d5-66b3-407d-b7ac-aa03ac13a6b6" }
              }
            }
          }
          EOF

          # 6. Final Identity Link
          mkdir -p .expo
          echo '{"projectId": "11b790d5-66b3-407d-b7ac-aa03ac13a6b6"}' > .expo/settings.json

      - name: Clean Install
        run: npm install --legacy-peer-deps

      - name: Build APK (Cloud Build)
        run: |
          export EAS_NO_VCS=1
          npx eas-cli build --platform android --profile preview --non-interactive
