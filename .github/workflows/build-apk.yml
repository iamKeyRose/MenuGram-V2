name: Build Android APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Rebuild Project Structure (No Assets)
        run: |
          # 1. Create a minimal Package.json for SDK 51
          cat <<EOF > package.json
          {
            "name": "menugram",
            "version": "1.0.0",
            "main": "index.js",
            "dependencies": {
              "expo": "~51.0.0",
              "expo-status-bar": "~1.12.1",
              "react": "18.2.0",
              "react-native": "0.74.1",
              "react-native-safe-area-context": "4.10.1",
              "react-native-screens": "3.31.1",
              "@react-navigation/native": "^6.1.17",
              "@react-navigation/bottom-tabs": "^6.5.20",
              "lucide-react-native": "^0.378.0"
            },
            "devDependencies": {
              "@babel/core": "^7.20.0"
            },
            "private": true
          }
          EOF

          # 2. Create index.js (Required for modern Expo)
          cat <<EOF > index.js
          import { registerRootComponent } from 'expo';
          import App from './App';
          registerRootComponent(App);
          EOF

          # 3. Create the Enterprise App.js
          cat <<EOF > App.js
          import React from 'react';
          import { View, Text } from 'react-native';
          import { NavigationContainer } from '@react-navigation/native';
          import { createBottomTabNavigator } from '@react-navigation/bottom-tabs';
          import { Wallet, Store, Search } from 'lucide-react-native';

          const Tab = createBottomTabNavigator();

          function WalletScreen() {
            return (
              <View style={{ flex: 1, justifyContent: 'center', alignItems: 'center', backgroundColor: '#6366f1' }}>
                <Text style={{ color: '#fff', fontSize: 40, fontWeight: 'bold' }}>450.00 MGRAM</Text>
              </View>
            );
          }

          export default function App() {
            return (
              <NavigationContainer>
                <Tab.Navigator>
                  <Tab.Screen name="Market" component={View} options={{ tabBarIcon: () => <Store color="#000" /> }} />
                  <Tab.Screen name="Wallet" component={WalletScreen} options={{ tabBarIcon: () => <Wallet color="#000" /> }} />
                  <Tab.Screen name="Search" component={View} options={{ tabBarIcon: () => <Search color="#000" /> }} />
                </Tab.Navigator>
              </NavigationContainer>
            );
          }
          EOF

          # 4. Minimal app.json (NO ICONS - this prevents the crash)
          cat <<EOF > app.json
          {
            "expo": {
              "name": "MenuGram",
              "slug": "menugram",
              "version": "1.0.0",
              "owner": "mytsoul",
              "platforms": ["android"],
              "android": {
                "package": "com.menugram.app"
              },
              "extra": {
                "eas": { "projectId": "11b790d5-66b3-407d-b7ac-aa03ac13a6b6" }
              }
            }
          }
          EOF

          # 5. Fix EAS Identity
          mkdir -p .expo
          echo '{"projectId": "11b790d5-66b3-407d-b7ac-aa03ac13a6b6"}' > .expo/settings.json

      - name: Clean Install
        run: npm install --legacy-peer-deps

      - name: Final Build APK
        run: |
          export EAS_NO_VCS=1
          npx eas-cli build --platform android --profile preview --non-interactive
  
